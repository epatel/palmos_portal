<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palm-Com Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; height: 100vh; display: flex; flex-direction: column; }

  header { background: #2c3e50; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .device-label { font-size: 13px; opacity: 0.8; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.connected { background: #2ecc71; }
  .status-dot.waiting { background: #f1c40f; animation: pulse 1.5s infinite; }
  .status-dot.disconnected { background: #e74c3c; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel — database list */
  .panel-left { width: 340px; min-width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
  .panel-header { padding: 10px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .panel-header h2 { font-size: 14px; font-weight: 600; color: #555; }
  .panel-header .actions { display: flex; gap: 4px; }
  .panel-header button { padding: 3px 8px; font-size: 11px; }

  .db-list { flex: 1; overflow-y: auto; }
  .db-item { padding: 8px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .db-item:hover { background: #f8f9fa; }
  .db-item.selected { background: #ebf5fb; border-left: 3px solid #3498db; }
  .db-item-name { font-size: 13px; font-weight: 500; }
  .db-item-meta { font-size: 11px; color: #999; }
  .db-item-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
  .db-item:hover .db-item-actions { opacity: 1; }
  .db-item-actions button { padding: 2px 6px; font-size: 10px; }

  .drop-zone { margin: 8px; padding: 16px; border: 2px dashed #ccc; border-radius: 6px; text-align: center; color: #aaa; font-size: 12px; cursor: pointer; flex-shrink: 0; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #3498db; background: #ebf5fb; color: #3498db; }
  .drop-zone input { display: none; }

  /* Right panel — content preview */
  .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .preview-header { padding: 10px 16px; border-bottom: 1px solid #eee; background: white; flex-shrink: 0; }
  .preview-header h2 { font-size: 14px; font-weight: 600; color: #555; }
  .preview-header .meta { font-size: 12px; color: #999; margin-top: 2px; }
  .preview-body { flex: 1; overflow: auto; background: #fafafa; }
  .preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; }
  .preview-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }

  /* Record list */
  .record-list { padding: 8px; }
  .record-item { background: white; border: 1px solid #eee; border-radius: 6px; padding: 10px 14px; margin-bottom: 6px; }
  .record-item .rec-header { font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
  .record-item .rec-text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .record-item .rec-hex { font-family: monospace; font-size: 12px; color: #666; word-break: break-all; }
  .record-item textarea { font-size: 15px; line-height: 1.5; width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-family: inherit; resize: vertical; min-height: 60px; }
  .record-item textarea:focus { outline: none; border-color: #3498db; }
  .record-item .rec-actions { margin-top: 8px; display: flex; gap: 6px; justify-content: flex-end; }
  .record-item .rec-actions button { font-size: 12px; }

  /* Resource list */
  .resource-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .resource-table th { text-align: left; padding: 6px 14px; border-bottom: 2px solid #eee; color: #666; font-size: 11px; text-transform: uppercase; background: white; position: sticky; top: 0; }
  .resource-table td { padding: 6px 14px; border-bottom: 1px solid #f0f0f0; }

  /* 3D viewer in preview panel */
  .preview-3d { width: 100%; height: 100%; }
  .preview-3d canvas { width: 100% !important; height: 100% !important; }

  .message { padding: 40px; text-align: center; color: #bbb; font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #2c3e50; color: white; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.error { background: #e74c3c; }

  .progress-bar { background: #ecf0f1; height: 3px; overflow: hidden; flex-shrink: 0; }
  .progress-bar .fill { background: #3498db; height: 100%; width: 0%; transition: width 0.3s; }

  button { background: #3498db; color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  button:hover { background: #2980b9; }
  button:disabled { background: #bdc3c7; cursor: not-allowed; }
  button.danger { background: #e74c3c; }
  button.danger:hover { background: #c0392b; }

  .dialog-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:300; }
  .dialog-overlay.show { display:flex; align-items:center; justify-content:center; }
  .dialog { background:white; border-radius:8px; padding:20px; width:90vw; max-width:500px; }
  .dialog h3 { margin-bottom:12px; font-size:16px; }
  .dialog textarea { width:100%; min-height:150px; font-size:15px; line-height:1.5; padding:8px; border:1px solid #ddd; border-radius:4px; font-family:inherit; resize:vertical; }
  .dialog textarea:focus { outline:none; border-color:#3498db; }
  .dialog .dialog-actions { margin-top:12px; display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>

<header>
  <h1>Palm-Com</h1>
  <div class="header-right">
    <span class="device-label" id="deviceLabel"></span>
    <div class="status">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
    <button id="btnDisconnect" class="danger" onclick="send({action:'disconnect'})" style="display:none">Disconnect</button>
  </div>
</header>

<div class="progress-bar" id="progressBar" style="display:none"><div class="fill" id="progressFill"></div></div>

<div class="main">
  <!-- Left: database list -->
  <div class="panel-left">
    <div class="panel-header">
      <h2>Databases <span id="dbCount"></span></h2>
      <div class="actions">
        <button id="btnRefresh" onclick="send({action:'refresh'})" disabled>Refresh</button>
        <button id="btnBackup" onclick="startBackup()" disabled>Backup</button>
      </div>
    </div>
    <div class="db-list" id="dbList">
      <div class="message" id="dbMessage">Press HotSync to connect</div>
    </div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      Drop files to install
      <input type="file" id="fileInput" accept=".prc,.pdb,.PRC,.PDB" multiple>
    </div>
  </div>

  <!-- Right: content preview -->
  <div class="panel-right">
    <div class="preview-header" id="previewHeader" style="display:none">
      <h2 id="previewName"></h2>
      <div class="meta" id="previewMeta"></div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="preview-placeholder" id="previewPlaceholder">Select a database to preview</div>
    </div>
  </div>
</div>

<div class="dialog-overlay" id="memoDialog">
  <div class="dialog">
    <h3 id="memoDialogTitle">New Memo</h3>
    <textarea id="memoDialogText" placeholder="Enter memo text..."></textarea>
    <div class="dialog-actions">
      <button class="secondary" onclick="closeMemoDialog()">Cancel</button>
      <button onclick="submitMemoDialog()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let ws, isConnected = false, allDbs = [], selectedDb = null;
let currentRenderer, currentAnimId, previewSeq = 0;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 1000);
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function handle(msg) {
  switch (msg.type) {
    case 'status': setStatus(msg.state); break;
    case 'sysinfo':
      document.getElementById('deviceLabel').textContent = `${msg.device} ROM ${msg.rom_version}`;
      break;
    case 'db_list':
      allDbs = msg.databases;
      renderDbList();
      break;
    case 'deleted': toast(`Deleted ${msg.name}`); break;
    case 'push_done': toast(`Installed ${msg.name}`); break;
    case 'progress': toast(msg.detail); break;
    case 'backup_progress':
      showProgress(msg.current, msg.total);
      toast(`Backing up ${msg.name}...`);
      break;
    case 'backup_done':
      hideProgress();
      toast('Backup complete');
      window.location = '/api/backup';
      break;
    case 'error': toast(msg.message, true); break;
  }
}

function setStatus(state) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  const labels = { connected: 'Connected', waiting: 'Waiting...', disconnected: 'Disconnected' };
  document.getElementById('statusText').textContent = labels[state] || state;
  isConnected = state === 'connected';
  document.getElementById('btnRefresh').disabled = !isConnected;
  document.getElementById('btnBackup').disabled = !isConnected;
  document.getElementById('btnDisconnect').style.display = isConnected ? '' : 'none';
  if (!isConnected) {
    document.getElementById('deviceLabel').textContent = '';
    document.getElementById('dbMessage').textContent = state === 'waiting' ? 'Press HotSync to connect' : 'Disconnected';
    document.getElementById('dbMessage').style.display = '';
    document.getElementById('dbList').querySelectorAll('.db-item').forEach(el => el.remove());
    document.getElementById('dbCount').textContent = '';
    clearPreview();
  }
}

function renderDbList() {
  const list = document.getElementById('dbList');
  const msg = document.getElementById('dbMessage');
  // Remove old items
  list.querySelectorAll('.db-item').forEach(el => el.remove());
  msg.style.display = allDbs.length ? 'none' : '';

  allDbs.forEach(db => {
    const div = document.createElement('div');
    div.className = 'db-item' + (selectedDb === db.name ? ' selected' : '');
    div.onclick = () => selectDb(db.name);
    div.innerHTML = `
      <div>
        <div class="db-item-name">${esc(db.name)}</div>
        <div class="db-item-meta">${esc(db.db_type)} / ${esc(db.creator)}${db.is_resource ? ' (app)' : ''}</div>
      </div>
      <div class="db-item-actions">
        <button onclick="event.stopPropagation(); pullDb('${esc(db.name)}')">DL</button>
        <button class="danger" onclick="event.stopPropagation(); deleteDb('${esc(db.name)}')">Del</button>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('dbCount').textContent = `(${allDbs.length})`;
}

function selectDb(name) {
  selectedDb = name;
  renderDbList();
  loadPreview(name);
}

function loadPreview(name) {
  const body = document.getElementById('previewBody');
  const header = document.getElementById('previewHeader');
  cleanupViewer();
  body.innerHTML = '<div class="preview-loading">Loading...</div>';
  header.style.display = 'none';

  const seq = ++previewSeq;
  fetch('/api/preview/' + encodeURIComponent(name))
    .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
    .then(data => { if (seq === previewSeq) renderPreview(data); })
    .catch(e => { if (seq === previewSeq) body.innerHTML = `<div class="preview-placeholder">Could not load preview</div>`; });
}

function renderPreview(data) {
  const body = document.getElementById('previewBody');
  const header = document.getElementById('previewHeader');
  header.style.display = '';
  document.getElementById('previewName').textContent = data.name;

  if (data.kind === 'model3d') {
    window._model3dData = data.data;
    document.getElementById('previewMeta').innerHTML = `3D Model - ${data.data.num_vertices} vertices, ${data.data.num_strips} strips <button onclick="downloadSTL()" style="margin-left:8px">Download STL</button>`;
    body.innerHTML = '<div class="preview-3d" id="viewer3d"></div>';
    initViewer(data.data, document.getElementById('viewer3d'));
  } else if (data.kind === 'app') {
    const i = data.info;
    document.getElementById('previewMeta').textContent = `${i.type} / ${i.creator}`;
    let html = '<div class="record-list">';
    html += '<div class="record-item"><div class="rec-header">Application Info</div><div class="rec-text">';
    html += `Name: ${esc(i.name)}\n`;
    if (i.version) html += `Version: ${esc(i.version)}\n`;
    html += `Creator: ${esc(i.creator)}\n`;
    html += `Total size: ${(i.total_size/1024).toFixed(1)} KB\n`;
    html += `Code size: ${(i.code_size/1024).toFixed(1)} KB\n`;
    html += `Forms: ${i.num_forms}  Bitmaps: ${i.num_bitmaps}  Strings: ${i.num_strings}`;
    html += '</div></div>';
    html += '<div class="record-item"><div class="rec-header">Resources (' + data.resources.length + ')</div>';
    html += '<table class="resource-table"><thead><tr><th>Type</th><th>ID</th><th>Size</th><th>Info</th></tr></thead><tbody>';
    data.resources.forEach(r => {
      const info = r.text ? esc(r.text) : '';
      html += `<tr><td><code>${esc(r.type)}</code></td><td>${r.id}</td><td>${r.size}</td><td>${info}</td></tr>`;
    });
    html += '</tbody></table></div></div>';
    body.innerHTML = html;
  } else if (data.kind === 'memos') {
    window._memoDbName = data.name;
    window._memoData = data.entries;
    document.getElementById('previewMeta').innerHTML = `${data.entries.length} memos <button onclick="newMemo()" style="margin-left:8px">+ New Memo</button>`;
    let html = '<div class="record-list">';
    data.entries.forEach((m, i) => {
      const full = m.title + (m.body ? '\n' + m.body : '');
      html += `<div class="record-item" id="memo-${i}">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div class="rec-header" style="flex:1;cursor:pointer" onclick="openMemoEditor(${i})">${esc(m.title)}</div>
          <div style="display:flex;gap:4px;opacity:0.4" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">
            ${i > 0 ? `<button style="padding:1px 6px;font-size:11px" onclick="event.stopPropagation();moveMemo(${m.index}, ${i}, ${i-1})">&#9650;</button>` : ''}
            ${i < data.entries.length-1 ? `<button style="padding:1px 6px;font-size:11px" onclick="event.stopPropagation();moveMemo(${m.index}, ${i}, ${i+1})">&#9660;</button>` : ''}
            <button class="danger" style="padding:1px 6px;font-size:11px" onclick="event.stopPropagation();deleteMemo(${m.index})">&#10005;</button>
          </div>
        </div>
        <div class="rec-text" style="cursor:pointer" onclick="openMemoEditor(${i})">${esc(m.body || '(click to edit)')}</div>
      </div>`;
    });
    body.innerHTML = html + '</div>';
  } else if (data.kind === 'datebook') {
    document.getElementById('previewMeta').textContent = `${data.entries.length} events`;
    let html = '<div class="record-list">';
    data.entries.forEach(e => {
      html += `<div class="record-item">
        <div class="rec-header">${esc(e.date)}${e.time ? ' ' + esc(e.time) : ' (untimed)'}</div>
        <div class="rec-text">${esc(e.description)}${e.note ? '\n\n' + esc(e.note) : ''}</div></div>`;
    });
    body.innerHTML = html + '</div>';
  } else if (data.kind === 'todo') {
    document.getElementById('previewMeta').textContent = `${data.entries.length} items`;
    // Store for editing
    window._todoData = data;
    let html = '<div class="record-list">';
    data.entries.forEach((t, i) => {
      const checked = t.completed ? 'checked' : '';
      const style = t.completed ? 'text-decoration:line-through; opacity:0.6' : '';
      html += `<div class="record-item" id="todo-${i}">
        <div class="todo-view" style="${style}">
          <label style="cursor:pointer"><input type="checkbox" ${checked} onchange="toggleTodo('${esc(data.name)}', ${i}, this.checked)">
          <strong>[${t.priority}]</strong>
          <span class="todo-desc" onclick="editTodo(${i})">${esc(t.description)}</span></label>
          ${t.due ? ' <span style="color:#999">(due ' + esc(t.due) + ')</span>' : ''}
          ${t.note ? '<div style="margin-top:4px;color:#666;font-size:13px">' + esc(t.note) + '</div>' : ''}
        </div>
        <div class="todo-edit" style="display:none">
          <div style="display:flex;gap:8px;margin-bottom:6px">
            <input type="text" class="todo-desc-input" value="${esc(t.description)}" style="flex:1;font-size:15px;padding:4px 8px;border:1px solid #ddd;border-radius:3px">
            <select class="todo-pri-input" style="padding:4px;border:1px solid #ddd;border-radius:3px">
              ${[1,2,3,4,5].map(p => `<option value="${p}" ${p===t.priority?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:6px">
            <input type="date" class="todo-due-input" value="${t.due||''}" style="font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:3px">
            <input type="text" class="todo-note-input" placeholder="Note" value="${esc(t.note||'')}" style="flex:1;font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:3px">
          </div>
          <div class="rec-actions">
            <button class="secondary" onclick="cancelTodoEdit(${i})">Cancel</button>
            <button onclick="saveTodo('${esc(data.name)}', ${i})">Save</button>
          </div>
        </div>
      </div>`;
    });
    body.innerHTML = html + '</div>';
  } else if (data.kind === 'address') {
    document.getElementById('previewMeta').textContent = `${data.entries.length} contacts`;
    let html = '<div class="record-list">';
    data.entries.forEach(a => {
      const name = [a.First, a.Last].filter(Boolean).join(' ') || a.Company || 'No name';
      let details = '';
      if (a.Company && a.First) details += a.Company + '\n';
      if (a.Title) details += a.Title + '\n';
      ['Phone1','Phone2','Phone3','Phone4','Phone5'].forEach(p => { if (a[p]) details += a[p] + '\n'; });
      if (a.Address) details += a.Address + '\n';
      const city = [a.City, a.State, a.Zip].filter(Boolean).join(', ');
      if (city) details += city + '\n';
      if (a.Country) details += a.Country;
      html += `<div class="record-item">
        <div class="rec-header">${esc(name)}</div>
        <div class="rec-text">${esc(details.trim())}</div></div>`;
    });
    body.innerHTML = html + '</div>';
  } else if (data.kind === 'obpj') {
    window._obpjData = data;
    document.getElementById('previewMeta').innerHTML = `OnboardC Project <button onclick="editObpj()" id="btnEditObpj" style="margin-left:8px">Edit</button>`;
    let html = '<div class="record-list"><div class="record-item">';
    html += '<div class="rec-header">Project Settings</div>';
    html += '<div id="obpj-view"><div class="rec-text" style="font-size:15px;line-height:2">';
    html += `<strong>Project:</strong> ${esc(data.project_name)}\n`;
    html += `<strong>PRC Name:</strong> ${esc(data.prc_name)}\n`;
    html += `<strong>Type:</strong> ${esc(data.type)}\n`;
    html += `<strong>Creator:</strong> ${esc(data.creator)}\n`;
    html += `<strong>Execute:</strong> ${data.execute ? 'On' : 'Off'}\n`;
    html += `<strong>Always Rebuild:</strong> ${data.always_rebuild ? 'On' : 'Off'}\n`;
    html += `<strong>Debug:</strong> ${data.debug ? 'On' : 'Off'}\n`;
    html += `<strong>Auto Version:</strong> ${data.auto_version ? 'On' : 'Off'}\n`;
    html += '</div></div>';
    html += `<div id="obpj-edit" style="display:none">
      <div style="display:grid;grid-template-columns:120px 1fr;gap:6px 12px;align-items:center;font-size:14px;margin-bottom:12px">
        <label>PRC Name:</label><input type="text" id="obpj-prc" value="${esc(data.prc_name)}" style="padding:4px 8px;border:1px solid #ddd;border-radius:3px">
        <label>Type:</label><input type="text" id="obpj-type" value="${esc(data.type)}" maxlength="4" style="padding:4px 8px;border:1px solid #ddd;border-radius:3px;width:80px">
        <label>Creator:</label><input type="text" id="obpj-creator" value="${esc(data.creator)}" maxlength="4" style="padding:4px 8px;border:1px solid #ddd;border-radius:3px;width:80px">
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:14px;margin-bottom:12px">
        <label><input type="checkbox" id="obpj-execute" ${data.execute?'checked':''}> Execute</label>
        <label><input type="checkbox" id="obpj-rebuild" ${data.always_rebuild?'checked':''}> Always Rebuild</label>
        <label><input type="checkbox" id="obpj-debug" ${data.debug?'checked':''}> Debug</label>
        <label><input type="checkbox" id="obpj-autoversion" ${data.auto_version?'checked':''}> Auto Version</label>
      </div>
      <div class="rec-actions">
        <button class="secondary" onclick="cancelObpj()">Cancel</button>
        <button onclick="saveObpj()">Save</button>
      </div>
    </div>`;
    html += '</div>';
    if (data.files.length) {
      html += '<div class="record-item"><div class="rec-header">Project Files (' + data.file_count + ')</div>';
      html += '<div style="font-size:15px">';
      data.files.forEach(f => {
        // Map filename to database name (remove extension for .c files, keep for .Rsrc)
        const dbName = f.replace(/\.Rsrc$/, '.Rsrc').replace(/\.c$/, '.c');
        const projName = data.project_name;
        const fullName = projName.replace(/[0-9]*$/, '') !== f.split('.')[0] ? f : projName + '.' + f.split('.').slice(-1)[0] === f ? f : f;
        html += `<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">

function pullDb(name) { window.location = '/api/pull/' + encodeURIComponent(name); }
function deleteDb(name) {
  if (confirm(`Delete "${name}"?`)) {
    send({ action: 'delete', name });
    if (selectedDb === name) clearPreview();
  }
}
function startBackup() { send({ action: 'backup' }); showProgress(0, 1); }
function showProgress(cur, tot) {
  document.getElementById('progressBar').style.display = '';
  document.getElementById('progressFill').style.width = (cur/tot*100)+'%';
}
function hideProgress() {
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 3000);
}

// File upload
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); uploadFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { uploadFiles(fileInput.files); fileInput.value = ''; });
function uploadFiles(files) {
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    toast(`Uploading ${file.name}...`);
    fetch('/api/push', { method: 'POST', body: form })
      .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); })
      .catch(e => toast(e.message, true));
  }
}

  document.getElementById('memoDialog').classList.remove('show');

function submitMemoDialog() {
  const text = document.getElementById('memoDialogText').value;
  if (!text.trim()) { toast('Memo cannot be empty', true); return; }
  closeMemoDialog();
  toast('Saving...');

  if (_memoEditIndex !== null) {
    // Edit existing
    fetch('/api/edit/' + encodeURIComponent(window._memoDbName) + '/' + _memoEditIndex, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text })
    })
    .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); return r.json(); })
    .then(() => { toast('Saved'); loadPreview(window._memoDbName); })
    .catch(e => toast(e.message, true));
  } else {
    // Create new
    fetch('/api/new-record/' + encodeURIComponent(window._memoDbName), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text })
    })
    .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); return r.json(); })
    .then(() => { toast('Created'); loadPreview(window._memoDbName); })
    .catch(e => toast(e.message, true));
  }
}

function selectDbByPartialName(fname) {
  // Find a database whose name ends with the filename (e.g. "Test2.c" or "Test2.Rsrc")

// STL export
function downloadSTL() {
  const d = window._model3dData;
  if (!d) return;
  const tris = d.triangles;
  const verts = d.vertices;

  // Binary STL: 80-byte header + 4-byte tri count + 50 bytes per triangle
  const buf = new ArrayBuffer(84 + tris.length * 50);
  const view = new DataView(buf);
  // Header (80 bytes, leave as zeros)
  view.setUint32(80, tris.length, true); // little-endian tri count

  let off = 84;
  tris.forEach(t => {
    const a = verts[t[0]], b = verts[t[1]], c = verts[t[2]];
    // Compute face normal
    const ux = b[0]-a[0], uy = b[1]-a[1], uz = b[2]-a[2];
    const vx = c[0]-a[0], vy = c[1]-a[1], vz = c[2]-a[2];
    const nx = uy*vz - uz*vy, ny = uz*vx - ux*vz, nz = ux*vy - uy*vx;
    const len = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
    // Normal
    view.setFloat32(off, nx/len, true); off += 4;
    view.setFloat32(off, ny/len, true); off += 4;
    view.setFloat32(off, nz/len, true); off += 4;
    // Vertices
    [a, b, c].forEach(v => {
      view.setFloat32(off, v[0], true); off += 4;
      view.setFloat32(off, v[1], true); off += 4;
      view.setFloat32(off, v[2], true); off += 4;
    });
    view.setUint16(off, 0, true); off += 2; // attribute byte count
  });

  const blob = new Blob([buf], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a2 = document.createElement('a');
  a2.href = url;
  a2.download = (d.name || 'model') + '.stl';
  a2.click();
  URL.revokeObjectURL(url);
  toast('Downloaded ' + a2.download);
}

// 3D Viewer (inline in preview panel)
function cleanupViewer() {
  if (currentAnimId) { cancelAnimationFrame(currentAnimId); currentAnimId = null; }
  if (currentRenderer) { currentRenderer.dispose(); currentRenderer = null; }
}

function initViewer(data, container) {
  const w = container.clientWidth, h = container.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  const positions = [];
  data.triangles.forEach(t => { for (const idx of t) { const v = data.vertices[idx]; positions.push(v[0], v[1], v[2]); } });
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.computeVertexNormals();
  geom.computeBoundingBox();
  const center = new THREE.Vector3(); geom.boundingBox.getCenter(center);
  geom.translate(-center.x, -center.y, -center.z);
  const size = new THREE.Vector3(); geom.boundingBox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);

  const group = new THREE.Group();
  group.add(new THREE.Mesh(geom, new THREE.MeshPhongMaterial({ color: 0x4a90d9, specular: 0x222222, shininess: 40, flatShading: true, side: THREE.DoubleSide })));
  group.add(new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: 0x88bbff, wireframe: true, transparent: true, opacity: 0.15 })));
  scene.add(group);
  scene.add(new THREE.AmbientLight(0x404040));
  const l1 = new THREE.DirectionalLight(0xffffff, 0.8); l1.position.set(5,5,5); scene.add(l1);
  const l2 = new THREE.DirectionalLight(0x8888ff, 0.4); l2.position.set(-5,-3,-5); scene.add(l2);
  const camDist = maxDim * 2.5;
  camera.position.set(0, 0, camDist); camera.lookAt(0,0,0);

  // Trackball rotation — maps mouse drag to rotation on a virtual sphere
  let drag = false, px, py;
  function trackballVector(x, y) {
    const rect = renderer.domElement.getBoundingClientRect();
    const v = new THREE.Vector3(
      (x - rect.left) / rect.width * 2 - 1,
      -((y - rect.top) / rect.height * 2 - 1),
      0
    );
    const len2 = v.x * v.x + v.y * v.y;
    v.z = len2 < 0.5 ? Math.sqrt(1 - len2) : 0.5 / Math.sqrt(len2);
    v.normalize();
    return v;
  }
  renderer.domElement.addEventListener('mousedown', e => { drag = true; px = e.clientX; py = e.clientY; });
  window.addEventListener('mouseup', () => drag = false);
  renderer.domElement.addEventListener('mousemove', e => {
    if (!drag) return;
    const va = trackballVector(px, py);
    const vb = trackballVector(e.clientX, e.clientY);
    const axis = new THREE.Vector3().crossVectors(va, vb).normalize();
    const angle = Math.acos(Math.min(1, va.dot(vb)));
    if (angle > 0.001) {
      const q = new THREE.Quaternion().setFromAxisAngle(axis, angle * 2);
      group.quaternion.premultiply(q);
    }
    px = e.clientX; py = e.clientY;
  });
  renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();
    camera.position.z *= e.deltaY > 0 ? 1.1 : 0.9;
  }, {passive: false});

  currentRenderer = renderer;
  (function animate() {
    currentAnimId = requestAnimationFrame(animate);
    renderer.render(scene, camera);
  })();
}
